services:
  agent:
    image: ghcr.io/andyishereboi/privatefrp-agent:latest
    network_mode: host
    environment:
      - SERVER_HOST=${SERVER_HOST}
      - SERVER_PORT=${SERVER_PORT:-7000}
      - AGENT_ID=${AGENT_ID}
      - AGENT_SECRET=${AGENT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TLS_REJECT_UNAUTHORIZED=true
    volumes:
      - ./data:./data
