name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      release_number:
        description: "Release version number"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  RELEASE_NUMBER: ${{ inputs.release_number }}

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Set short commit SHA
        id: short_sha
        shell: bash
        run: |
          echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compile requested binaries
        shell: bash
        run: |
          mkdir -p release

          # Server binaries
          bun build packages/server/src/index.ts --compile --target=bun-windows-x64-baseline --outfile release/privatefrp-server-windows-x64.exe
          bun build packages/server/src/index.ts --compile --target=bun-linux-x64-baseline --outfile release/privatefrp-server-linux-amd64

          # Agent binaries  
          bun build packages/agent/src/index.ts --compile --target=bun-windows-x64-baseline --outfile release/privatefrp-agent-windows-x64.exe
          bun build packages/agent/src/index.ts --compile --target=bun-linux-x64-baseline --outfile release/privatefrp-agent-linux-amd64

          chmod +x release/privatefrp-server-linux-amd64 release/privatefrp-agent-linux-amd64

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release/*

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [build, docker-images]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: release

      - name: Generate commit summary
        shell: bash
        run: |
          CURRENT_TAG="${RELEASE_NUMBER}"
          GHCR_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          if git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
            PREV_TAG=$(git tag --sort=-creatordate | grep -Fxv "${CURRENT_TAG}" | head -n 1)
          else
            PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          fi

          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          COMMITS=$(git log --pretty='- %s ([%h]('${GITHUB_SERVER_URL}'/'${GITHUB_REPOSITORY}'/commit/%H))' ${RANGE})
          if [ -z "${COMMITS}" ]; then
            COMMITS="- No commits found."
          fi

          {
            echo "## PrivateFRP ${CURRENT_TAG}"
            echo
            echo "### Main Updates"
            echo "- "
            echo
            echo "### Docker Images"
            echo "- Server:"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-server:${CURRENT_TAG}\`"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-server:${SHORT_SHA}\`"
            echo "- Agent:"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-agent:${CURRENT_TAG}\`"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-agent:${SHORT_SHA}\`"
            echo
            echo "### Included Commits"
            echo "${COMMITS}"
          } > release-notes.md

      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NUMBER }}
          name: ${{ env.RELEASE_NUMBER }}
          draft: true
          overwrite_files: true
          body_path: release-notes.md
          files: release/*

  docker-images:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - image_name: privatefrp-server
            dockerfile: Dockerfile.server
          - image_name: privatefrp-agent
            dockerfile: Dockerfile.agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Set lowercase GHCR owner
        id: ghcr_owner
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image (buildx)
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT=$(git rev-parse --short HEAD)
          docker buildx build --file "${{ matrix.dockerfile }}" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:latest" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:${{ env.RELEASE_NUMBER }}" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:${SHORT}" \
            --push .
