name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compile requested binaries
        shell: bash
        run: |
          mkdir -p release

          bun build packages/server/src/index.ts --compile --target=bun-linux-x64-baseline --outfile release/privatefrp-server-linux-amd64
          bun build packages/agent/src/index.ts --compile --target=bun-linux-x64-baseline --outfile release/agent

          chmod +x release/privatefrp-server-linux-amd64 release/agent

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release/*

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: build
    env:
      TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: release

      - name: Generate commit summary
        shell: bash
        run: |
          CURRENT_TAG="${TAG_NAME}"

          if git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
            PREV_TAG=$(git tag --sort=-creatordate | grep -Fxv "${CURRENT_TAG}" | head -n 1)
          else
            PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          fi

          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          COMMITS=$(git log --pretty='- %s (%h)' ${RANGE})
          if [ -z "${COMMITS}" ]; then
            COMMITS="- No commit subjects found."
          fi

          {
            echo "## PrivateFRP ${CURRENT_TAG}"
            echo
            echo "### Included Commit Subjects"
            echo "${COMMITS}"
            echo
            echo "### Attached Binaries"
            echo "- privatefrp-server-linux-amd64"
            echo "- agent"
          } > release-notes.md

      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          draft: true
          overwrite_files: true
          body_path: release-notes.md
          files: release/*
