name: Release

on:
  workflow_dispatch:
    inputs:
      release_number:
        description: "Release version number"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  RELEASE_NUMBER: ${{ inputs.release_number }}
  RELEASE_BRANCH: release/v${{ inputs.release_number }}

jobs:
  version-commit:
    name: Commit version and create release branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Write VERSION file and push release branch
        shell: bash
        run: |
          echo "${{ env.RELEASE_NUMBER }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ env.RELEASE_BRANCH }}"
          git add VERSION
          git commit -m "release: ${{ env.RELEASE_NUMBER }}"
          git push origin "${{ env.RELEASE_BRANCH }}" --force

  docker-images:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    needs: [version-commit]
    strategy:
      matrix:
        include:
          - image_name: privatefrp-server
            dockerfile: Dockerfile.server
          - image_name: privatefrp-agent
            dockerfile: Dockerfile.agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Show checked-out commit
        shell: bash
        run: |
          echo "HEAD:           $(git rev-parse HEAD)"
          echo "HEAD short:     $(git rev-parse --short HEAD)"
          echo "HEAD subject:   $(git log -1 --pretty=%s)"
          echo "Release branch: ${RELEASE_BRANCH}"

      - name: Build and push image (buildx)
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT=$(git rev-parse --short HEAD)
          echo "Building ${{ matrix.image_name }}:${{ env.RELEASE_NUMBER }} from commit ${SHORT}"
          docker buildx build --file "${{ matrix.dockerfile }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --pull \
            --build-arg "BUILD_COMMIT=${SHORT}" \
            --build-arg "BUILD_VERSION=${{ env.RELEASE_NUMBER }}" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:${{ env.RELEASE_NUMBER }}" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:${SHORT}" \
            --tag "ghcr.io/${OWNER}/${{ matrix.image_name }}:latest" \
            --push .

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [docker-images]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_BRANCH }}

      - name: Generate commit summary
        shell: bash
        run: |
          CURRENT_TAG="${RELEASE_NUMBER}"
          GHCR_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          if git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
            PREV_TAG=$(git tag --sort=-creatordate | grep -Fxv "${CURRENT_TAG}" | head -n 1)
          else
            PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          fi

          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          COMMITS=$(git log --pretty='- %s ([%h]('${GITHUB_SERVER_URL}'/'${GITHUB_REPOSITORY}'/commit/%H))' ${RANGE})
          if [ -z "${COMMITS}" ]; then
            COMMITS="- No commits found."
          fi

          {
            echo "## PrivateFRP ${CURRENT_TAG}"
            echo
            echo "### Docker Images"
            echo "- Server:"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-server:${CURRENT_TAG}\`"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-server:${SHORT_SHA}\`"
            echo "- Agent:"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-agent:${CURRENT_TAG}\`"
            echo "  - \`ghcr.io/${GHCR_OWNER}/privatefrp-agent:${SHORT_SHA}\`"
            echo
            echo "### Included Commits"
            echo "${COMMITS}"
          } > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NUMBER }}
          name: ${{ env.RELEASE_NUMBER }}
          draft: false
          overwrite_files: true
          body_path: release-notes.md
