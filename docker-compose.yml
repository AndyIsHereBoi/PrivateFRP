services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: privatefrp-server
    restart: unless-stopped
    network_mode: "host"
    environment:
      - SERVER_PORT=7000
      - DASHBOARD_PORT=8089
      - LOG_LEVEL=info
      - DATABASE_PATH=./data/privatefrp.db
      - TLS_CERT=
      - TLS_KEY=
    volumes:
      - ./data:/app/data

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: privatefrp-agent
    restart: unless-stopped
    network_mode: "host"
    environment:
      - SERVER_HOST=localhost
      - SERVER_PORT=7000
      - AGENT_ID=agent-1
      - AGENT_SECRET=your-secret-here
      - LOG_LEVEL=info
    depends_on:
      - server
