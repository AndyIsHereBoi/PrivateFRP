services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: privatefrp-server
    restart: unless-stopped
    ports:
      - "7000:7000"
      - "8089:8089"
    environment:
      - SERVER_PORT=7000
      - DASHBOARD_PORT=8089
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: privatefrp-agent
    restart: unless-stopped
    environment:
      - SERVER_HOST=privatefrp-server
      - SERVER_PORT=7000
      - AGENT_ID=agent-1
      - AGENT_SECRET=your-secret-here
      - LOG_LEVEL=info
    depends_on:
      - server
