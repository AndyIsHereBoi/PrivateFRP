version: "3.9"

# Docker Compose for PrivateFRP
# Runs the server. The agent runs separately on your private machine.
# See README.md for setup instructions.

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    # host networking lets the server bind tunnel ports directly without enumerating
    # every port in a `ports` list. Ensure ports 7000, 8080, and any tunnel ports
    # are free on the host before starting.
    network_mode: host
    volumes:
      - ./data:/app/data         # SQLite database
      - ./certs:/app/certs:ro    # TLS certificates
    environment:
      AGENT_PORT: ${AGENT_PORT:-7000}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8080}
      AGENT_TLS_CERT: /app/certs/server.crt
      AGENT_TLS_KEY: /app/certs/server.key
      DASHBOARD_SECRET: ${DASHBOARD_SECRET:-admin:changeme}
      DATA_DIR: /app/data
      PUBLIC_IP: ${PUBLIC_IP:-}
